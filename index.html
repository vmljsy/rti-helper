<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RTI Text Validator & Fixer</title>
<style>
  body { 
    font-family: Arial, sans-serif; 
    max-width: 800px; 
    margin: 40px auto; 
    padding: 20px; 
    line-height: 1.6;
    color: #333;
  }
  h2 { color: #0056b3; }
  textarea { 
    width: 100%; 
    height: 180px; 
    padding: 12px; 
    margin-bottom: 15px; 
    font-size: 15px; 
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
  }
  button { 
    padding: 12px 24px; 
    font-size: 16px; 
    font-weight: bold;
    background-color: #007BFF; 
    color: white; 
    border: none; 
    border-radius: 4px;
    cursor: pointer; 
  }
  button:hover { background-color: #0056b3; }
  .results { 
    margin-top: 30px; 
    padding: 20px; 
    border: 1px solid #ddd; 
    background-color: #f8f9fa; 
    border-radius: 4px;
  }
  .error-msg { color: #d9534f; font-weight: bold; font-size: 18px;}
  .success-msg { color: #5cb85c; font-weight: bold; font-size: 18px;}
  .char-box {
    display: inline-block;
    background: #fff;
    border: 1px solid #d9534f;
    padding: 2px 8px;
    margin: 0 4px;
    border-radius: 3px;
    font-family: monospace;
    font-size: 16px;
  }
</style>
</head>
<body>

  <h2>RTI Application Text Validator</h2>
  <p>Paste your RTI draft below. This tool will find characters that cause the "Only alphabets..." error on the RTI Online portal and provide a cleaned-up version ready for submission.</p>

  <textarea id="inputText" placeholder="Paste your RTI text here..."></textarea>
  <button onclick="validateAndFix()">Check & Fix Text</button>

  <div class="results" id="resultsArea" style="display: none;">
    <h3>Analysis Report:</h3>
    <p id="errorReport"></p>

    <h3>Fixed Text (Ready to Copy to RTI Portal):</h3>
    <textarea id="outputText" readonly></textarea>
  </div>

  <script>
    function validateAndFix() {
      const input = document.getElementById('inputText').value;
      
      // Regex for FORBIDDEN characters. 
      // Allowed list from RTI: A-Z, a-z, 0-9, whitespace (\s), and , . - _ ( ) / @ : & \ ? %
      // The regex [^...] finds anything that is NOT in this allowed list.
      const forbiddenRegex = /[^A-Za-z0-9\s,.\-_()/@:&\\?%]/g;
      
      // Find all forbidden characters in the text
      const foundErrors = input.match(forbiddenRegex);
      const errorReportEl = document.getElementById('errorReport');
      
      if (foundErrors) {
        // Filter down to a unique list of bad characters to show the user
        const uniqueErrors = [...new Set(foundErrors)];
        
        // Create nice little visual boxes for each bad character (e.g., ' or " or ;)
        const badCharsHtml = uniqueErrors.map(char => `<span class="char-box">${char}</span>`).join('');
        
        errorReportEl.innerHTML = `
          <span class="error-msg">⚠️ Prohibited characters found:</span><br><br>
          ${badCharsHtml}<br><br>
          <em>These characters have been automatically removed in the fixed text below.</em>
        `;
      } else {
        errorReportEl.innerHTML = "<span class='success-msg'>✅ Success! No prohibited characters found. This text is safe to submit.</span>";
      }

      // Generate the fixed text by removing all forbidden characters
      const fixedText = input.replace(forbiddenRegex, '');
      
      document.getElementById('outputText').value = fixedText;
      document.getElementById('resultsArea').style.display = 'block';
    }
  </script>

</body>
</html>
